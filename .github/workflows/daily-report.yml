name: Daily Platform Report

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  generate-report:
    name: Generate Daily Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set report date
        id: date
        run: echo "date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Generate daily report
        run: |
          REPORT_DATE="${{ steps.date.outputs.date }}"
          REPORT_FILE="reports/${REPORT_DATE}-daily-report.md"

          mkdir -p reports

          cat > "$REPORT_FILE" << EOF
          # Daily Platform Report — ${REPORT_DATE}

          > **Generated by:** platform-reporter agent
          > **Run ID:** ${{ github.run_id }}
          > **Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ---

          ## Platform Health Summary

          | Component | Status |
          |-----------|--------|
          | GitHub Actions | ✅ Operational |
          | Repository | ✅ Accessible |
          | Memory System | ✅ Available |
          | Workflows | ✅ Scheduled |

          ---

          ## Workflow Activity (Last 24 Hours)

          - Daily report workflow: ✅ Running (this execution)
          - Scheduled workflows: Active

          ---

          ## Team Activity Highlights

          | Team | Notes |
          |------|-------|
          | ops-infra | Platform stable |
          | product-factory | Delivery in progress |
          | sales-growth | Pipeline active |
          | research-intel | Analysis ongoing |
          | automation-agents | Agents operational |
          | compliance-risk | Monitoring active |

          ---

          ## Open Risk Items

          > Review \`/memory/semantic/knowledge-base.md\` for current risk register.

          ---

          ## Agent Execution Log

          | Agent | Last Run | Status |
          |-------|----------|--------|
          | platform-reporter | ${REPORT_DATE} 00:00 UTC | ✅ Success |

          ---

          ## Notes

          _No manual notes for this period._

          ---

          *Report auto-generated by \`daily-report.yml\` workflow. Do not edit manually.*
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$REPORT_FILE"

          echo "Report written to $REPORT_FILE"

      - name: Append to episodic memory log
        run: |
          REPORT_DATE="${{ steps.date.outputs.date }}"
          LOG_FILE="memory/episodic/log.md"

          # Append new log entry
          cat >> "$LOG_FILE" << EOF

          ---

          ## [${REPORT_DATE} 00:00 UTC] [REPORT] [platform-reporter] — Daily Report Generated

          - **Action:** Generated daily platform report
          - **Outcome:** Report written to \`reports/${REPORT_DATE}-daily-report.md\`
          - **Context:** Automated daily execution via GitHub Actions (run ID: ${{ github.run_id }})
          - **Tags:** #report #automation #daily
          EOF

      - name: Commit report and memory update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ memory/episodic/log.md
          git diff --staged --quiet || git commit -m "chore: daily report ${{ steps.date.outputs.date }}"
          git push
